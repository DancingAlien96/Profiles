<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>René Alvarado · Ingeniero en Ciencias y Sistemas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="renealvarado-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Fondo: imagen opcional + circuito + nodos -->
    <div class="bg-image"></div>
    <div class="circuit-grid"></div>
    <div class="particles"></div>

    <!-- Tarjeta principal -->
    <main class="card">
        <div class="avatar-wrap">
            <div class="avatar-ring"></div>
            <img src="renealvarado.jpg" alt="René Alvarado">
        </div>

        <h1 class="name"><span class="gold">René</span> Alvarado</h1>

        <div class="divider">
            <span></span>
            <i class="fas fa-microchip"></i>
            <span></span>
        </div>

        <p class="role">Ingeniero en Ciencias y Sistemas</p>

        <p class="tagline">
            Desarrollo de software, arquitectura de sistemas y soluciones tecnológicas
            que transforman ideas en resultados.
        </p>

        <div class="actions">
            <a href="https://wa.me/50247694804" class="btn" target="_blank" rel="noopener noreferrer">
                <span class="btn-icon"><i class="fab fa-whatsapp"></i></span>
                <span class="btn-text">
                    <strong>WhatsApp</strong>
                    <span>+502 4769 4804</span>
                </span>
                <i class="fas fa-arrow-right btn-arrow"></i>
            </a>

            <a href="https://www.linkedin.com/in/rene-alvarado-gt/" class="btn" target="_blank" rel="noopener noreferrer">
                <span class="btn-icon"><i class="fab fa-linkedin-in"></i></span>
                <span class="btn-text">
                    <strong>LinkedIn</strong>
                    <span>Perfil profesional</span>
                </span>
                <i class="fas fa-arrow-right btn-arrow"></i>
            </a>

            <a href="mailto:ralvarado@cunori.edu.gt" class="btn">
                <span class="btn-icon"><i class="fas fa-envelope"></i></span>
                <span class="btn-text">
                    <strong>Correo</strong>
                    <span>ralvarado@cunori.edu.gt</span>
                </span>
                <i class="fas fa-arrow-right btn-arrow"></i>
            </a>
        </div>

        <p class="footer">INGENIERÍA · INNOVACIÓN · TECNOLOGÍA</p>
    </main>

    <script>
        // Generar nodos dorados flotantes
        (function createNodes() {
            const container = document.querySelector('.particles');
            const count = 36;
            for (let i = 0; i < count; i++) {
                const node = document.createElement('span');
                node.className = 'node';
                node.style.left = Math.random() * 100 + '%';
                node.style.top = (100 + Math.random() * 20) + '%';
                node.style.animationDuration = (10 + Math.random() * 14) + 's';
                node.style.animationDelay = (Math.random() * 12) + 's';
                const size = 2 + Math.random() * 3;
                node.style.width = size + 'px';
                node.style.height = size + 'px';
                container.appendChild(node);
            }
        })();

        // Animación de entrada
        window.addEventListener('load', () => {
            document.querySelector('.card').classList.add('loaded');
        });
    </script>
</body>
</html>
